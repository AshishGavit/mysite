{% extends 'main/base.html' %}
{% block title %}View Lists{% endblock %}
{% block content %}
    <h1>{{ls}}</h1>
    <form method="post" action="#">
        {% csrf_token %}
            {% for items in ls.item_set.all %}
                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <div class="input-group-text">
                            {% if items.complete == True %}
                                <input type="checkbox" value="clicked" name="c{{items.id}}" checked>
                            {% else %}
                                <input type="checkbox" value="clicked" name="c{{items.id}}">
                            {% endif %}
                        </div>
                    </div>
                    <input type="text" value="{{items.text}}" class="form-control">
                </div>
            {% endfor %}
        <div class="input-group mb-3">
            <div class="input-group-prepend">
                <button type="submit" name="addItem" value="addItem" class="btn btn-success">Add Item</button>
            </div>
            <input type="text" name="new">
        </div>
        <button type="submit" name="save" value="save" class="btn btn-success">Save</button>
    </form>
{% endblock %}
